<head>
  <meta charset="UTF-8">

  <title>Tools</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #020617; overflow-x: hidden; }
    #gate { position: fixed; inset: 0; background: #020617; display: flex; align-items: center; justify-content: center; z-index: 9999; font-family: 'DM Sans', sans-serif; padding: 16px; }
    .gate-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #22d3ee22; border-radius: 16px; padding: 40px 32px; text-align: center; width: 100%; max-width: 340px; }
    .gate-title { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: #22d3ee; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .gate-sub { font-size: 12px; color: #64748b; margin-bottom: 28px; }
    .gate-input { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px 16px; color: #e2e8f0; font-family: 'Space Mono', monospace; font-size: 15px; outline: none; text-align: center; letter-spacing: 3px; transition: border-color 0.2s; }
    .gate-input:focus { border-color: #22d3ee; }
    .gate-btn { margin-top: 14px; width: 100%; padding: 14px; background: #22d3ee; color: #020617; border: none; border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
    .gate-btn:hover { background: #06b6d4; }
    .gate-error { margin-top: 10px; font-size: 11px; color: #f43f5e; min-height: 16px; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
    .shake { animation: shake 0.4s ease; }
    input[type=range]{-webkit-appearance:none;appearance:none;background:#334155;border-radius:4px;outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#22d3ee;cursor:pointer;border:2px solid #0f172a}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .tab-bar { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px; }
    .tab-bar::-webkit-scrollbar { display:none; }
    .tab-bar { -ms-overflow-style:none; scrollbar-width:none; }
    .tab-btn { flex-shrink:0; white-space:nowrap; font-size:11px; font-weight:600; padding:8px 13px; border-radius:7px; cursor:pointer; border-width:1px; border-style:solid; -webkit-tap-highlight-color:transparent; }
  </style>
</head>
<body>

  <!-- Password Gate -->
  <div id="gate">
    <div class="gate-card">
      <div class="gate-title">Private Access</div>
      <div class="gate-sub">Enter your access code to continue</div>
      <input class="gate-input" id="pw" type="password" placeholder="••••••••••" autocomplete="off" />
      <button class="gate-btn" id="pw-btn">ENTER →</button>
      <div class="gate-error" id="pw-err"></div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    const HASH = "2727f4be402b04b01244bb2bdfc684adc76d2f4d195db8b7e1550d9df13cceb9";
    const gate = document.getElementById('gate');
    const pwInput = document.getElementById('pw');
    const pwBtn = document.getElementById('pw-btn');
    const pwErr = document.getElementById('pw-err');

    if (sessionStorage.getItem('auth') === HASH) {
      gate.style.display = 'none';
    }

    async function tryUnlock() {
      const val = pwInput.value;
      const enc = new TextEncoder();
      const buf = await crypto.subtle.digest('SHA-256', enc.encode(val));
      const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
      if (hex === HASH) {
        sessionStorage.setItem('auth', HASH);
        gate.style.display = 'none';
      } else {
        pwErr.textContent = 'Invalid code.';
        const card = gate.querySelector('.gate-card');
        card.classList.remove('shake');
        void card.offsetWidth;
        card.classList.add('shake');
        pwInput.value = '';
        pwInput.focus();
      }
    }

    pwBtn.addEventListener('click', tryUnlock);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const fmt = (n) => { if (n == null || isNaN(n)) return "$0"; return (n < 0 ? "-$" : "$") + Math.abs(Math.round(n)).toLocaleString("en-US"); };
    const fmtM = (n) => { const m = n / 1000000; return m >= 1 ? `$${m.toFixed(1)}M` : n >= 1000 ? `$${Math.round(n / 1000)}K` : `$${Math.round(n)}`; };
    const pct = (n) => `${(n * 100).toFixed(1)}%`;

    const Slider = ({ label, value, onChange, min, max, step, format = "dollar", sub }) => (
      <div style={{ marginBottom: 13 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 2 }}>
          <span style={{ fontSize: 11, color: "#94a3b8", fontWeight: 500 }}>{label}</span>
          <span style={{ fontFamily: "'Space Mono'", fontSize: 12, color: "#e2e8f0", fontWeight: 700 }}>{format === "dollar" ? fmtM(value) : format === "percent" ? pct(value) : format === "year" ? `Yr ${value} (${2025 + value})` : value}</span>
        </div>
        {sub && <div style={{ fontSize: 9, color: "#64748b", marginBottom: 2 }}>{sub}</div>}
        <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(parseFloat(e.target.value))} style={{ width: "100%", accentColor: "#22d3ee", height: 5, cursor: "pointer" }} />
      </div>
    );

    const Card = ({ title, children, accent = "#22d3ee" }) => (
      <div style={{ background: "linear-gradient(135deg, #1e293b 0%, #0f172a 100%)", border: `1px solid ${accent}22`, borderRadius: 12, padding: 18, marginBottom: 14 }}>
        {title && <h3 style={{ fontSize: 12, fontWeight: 700, color: accent, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12, marginTop: 0 }}>{title}</h3>}
        {children}
      </div>
    );

    const Metric = ({ label, value, sub, color = "#22d3ee", large }) => (
      <div style={{ background: `${color}0a`, border: `1px solid ${color}25`, borderRadius: 10, padding: large ? "12px 8px" : "8px 6px", textAlign: "center" }}>
        <div style={{ fontFamily: "'Space Mono'", fontSize: large ? 15 : 13, fontWeight: 700, color, lineHeight: 1.1 }}>{value}</div>
        <div style={{ fontSize: 9, color: "#94a3b8", marginTop: 3 }}>{label}</div>
        {sub && <div style={{ fontSize: 8, color: "#64748b", marginTop: 1 }}>{sub}</div>}
      </div>
    );

    const Toggle = ({ label, on, onToggle, sub, color = "#22d3ee" }) => (
      <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 12, padding: "8px 0", borderBottom: "1px solid #1e293b" }}>
        <button onClick={onToggle} style={{ width: 36, height: 20, borderRadius: 10, border: "none", cursor: "pointer", background: on ? color : "#334155", position: "relative", flexShrink: 0, marginTop: 2 }}>
          <div style={{ width: 16, height: 16, borderRadius: "50%", background: "#fff", position: "absolute", top: 2, left: on ? 18 : 2, transition: "left 0.2s" }} />
        </button>
        <div><div style={{ fontSize: 12, color: on ? "#e2e8f0" : "#64748b", fontWeight: 600 }}>{label}</div>
          {sub && <div style={{ fontSize: 10, color: "#64748b", marginTop: 2, lineHeight: 1.4 }}>{sub}</div>}
        </div>
      </div>
    );

    const WAVES = [
      { id: "gov", name: "AI Governance", color: "#a78bfa", years: [1,5], peak: "2027-2029", desc: "EU AI Act enforcement, US AI bills. Every AI agent needs governance.", you: "Built governance inside regulated utility. As SaaS collapses, governance is what analysts say is NEXT." },
      { id: "africa", name: "Africa Workforce", color: "#f59e0b", years: [2,15], peak: "2030-2040", desc: "740M new working-age Africans by 2050. Francophone market underserved. Institutional billions flowing.", you: "French + Beninese roots + Harvard + Develop Gio. Relationship-driven, AI-proof." },
      { id: "quantum", name: "Quantum Governance", color: "#06b6d4", years: [5,15], peak: "2032-2037", desc: "NIST deprecates RSA by 2030. $97B quantum market by 2035. 250K professionals needed. All compliance rewritten.", you: "AI governance cert infrastructure pivots to quantum with 5-year head start." },
      { id: "energy", name: "Energy/Climate AI", color: "#4ade80", years: [3,13], peak: "2029-2036", desc: "AI for grid optimization, carbon tracking. Legally mandated compliance.", you: "Eversource = AI + regulated utility + governance. A niche that barely exists." },
      { id: "geo", name: "Francophone Geopolitics", color: "#f43f5e", years: [1,15], peak: "2027-2040", desc: "France losing West Africa influence. Institutions need credible delivery partners.", you: "Beninese-American, French, Harvard, AI expert with government connections." },
    ];

    const RISKS = [
      { title: "Big 4 Competition", icon: "🏢", color: "#f97316", text: "Deloitte, PwC, EY, KPMG are all building AI governance practices. Your defense: own the certification standard so they become your CUSTOMERS, not competitors. They'll send their people to get YOUR cert.", action: "Build brand dominance in Years 1-3 before they catch up. File trademark for certification." },
      { title: "Eversource Non-Compete & IP", icon: "⚠️", color: "#f43f5e", text: "Your employment agreement may restrict AI governance consulting for 12 months post-exit. IP assignment clauses could mean anything you build while employed belongs to them. MA limits non-competes to 12 months.", action: "READ YOUR AGREEMENT THIS WEEK. Know exactly what you signed before building anything." },
      { title: "AI Governance Commoditization", icon: "🤖", color: "#a78bfa", text: "In 5 years, AI tools may automate 60-70% of governance work. Your consulting revenue could plateau. But certification bodies don't get commoditized — PMP wasn't disrupted by PM software.", action: "Shift primary revenue from consulting to certification by Year 5-6. Consulting becomes the on-ramp to cert." },
      { title: "Africa Political Risk", icon: "🌍", color: "#f59e0b", text: "USAID budgets swing with administrations. Coups in Mali, Burkina Faso, Niger. Benin is stable but contingency needed. CFA franc / currency risk on Africa revenue.", action: "Diversify funding across US, European (GIZ/AFD), multilateral (World Bank), and private foundations. Price contracts in USD/EUR." },
      { title: "Harvard Network (Underused)", icon: "🎓", color: "#22d3ee", text: "HGSE alumni network, Harvard Club of Boston, Harvard African Alumni are direct pipelines to decision-makers at foundations, school systems, policy orgs. You're not weaponizing this.", action: "Attend every HGSE alumni event. Join Harvard Club. Reconnect with classmates now in positions of influence." },
      { title: "Advisory Board (Missing)", icon: "👔", color: "#4ade80", text: "You need 3-5 people: regulatory lawyer, Big 4 partner, someone with an exit, someone in African development. They open doors you can't.", action: "Identify and approach 5 potential advisors. Offer 0.25-1% equity or relationship value." },
      { title: "Health & Disability", icon: "❤️", color: "#f87171", text: "You're the single point of failure. 6 months incapacitated and everything stops. Disability insurance is cheap while you're employed.", action: "Get disability insurance through Eversource benefits NOW while it's affordable. This costs ~$200/yr and protects your entire trajectory." },
    ];

    const ACTIONS = [
      { priority: 1, action: "Talk to tax attorney about Section 1202 QSBS", detail: "If you structure as C-Corp from Day 1 and hold stock 5+ years, you can exclude up to $10M in capital gains at exit. This single conversation could save you $10M+.", deadline: "Before you incorporate", color: "#4ade80" },
      { priority: 2, action: "Read Eversource employment agreement line by line", detail: "Non-compete, IP assignment, moonlighting policy. Know what you can and can't do. MA limits non-competes to 12 months.", deadline: "This week", color: "#f43f5e" },
      { priority: 3, action: "Open a Donor Advised Fund", detail: "Even with $500. Starts the clock, builds the habit, creates a philanthropic track record Harvard's development office will notice.", deadline: "This month", color: "#a78bfa" },
      { priority: 4, action: "Get disability insurance", detail: "While still employed at Eversource. Much cheaper as employee vs self-employed. Protects your entire $100M trajectory for ~$200/yr.", deadline: "Next benefits enrollment", color: "#f87171" },
      { priority: 5, action: "Set up Solo 401k structure", detail: "Once self-employed, shelter up to $69K/yr from taxes. Over 15 years at 10% returns = $2M+ tax-advantaged wealth.", deadline: "When you leave Eversource", color: "#22d3ee" },
      { priority: 6, action: "File trademark for AI governance certification name", detail: "Before anyone else does. This protects your brand and certification standard. Relatively cheap (~$350 per class).", deadline: "Year 1-2", color: "#f59e0b" },
    ];

    function App() {
      const [tab, setTab] = useState("trajectory");
      const [everYrs, setEverYrs] = useState(2);
      const [cGrowth, setCGrowth] = useState(0.60);
      const [certLaunchYr, setCertLaunchYr] = useState(4);
      const [certGrowth, setCertGrowth] = useState(0.70);
      const [africaGrowth, setAfricaGrowth] = useState(0.50);
      const [quantumLaunchYr, setQuantumLaunchYr] = useState(7);
      const [invRet, setInvRet] = useState(0.10);
      const [saveRt, setSaveRt] = useState(0.30);
      const [exitYr, setExitYr] = useState(13);
      const [exitMx, setExitMx] = useState(6);
      const [startNW, setStartNW] = useState(50000);
      const [gift, setGift] = useState(15000000);
      const [giftPct, setGiftPct] = useState(0.15);
      const [studentLoan, setStudentLoan] = useState(100000);
      const [loanRate, setLoanRate] = useState(0.065);
      const [loanPayoff, setLoanPayoff] = useState("strategic");
      const [loanPayoffYr, setLoanPayoffYr] = useState(4);
      const [recession, setRecession] = useState(true);
      const [recessionYr, setRecessionYr] = useState(6);
      const [qsbs, setQsbs] = useState(true);
      const [solo401k, setSolo401k] = useState(true);
      const [marriage, setMarriage] = useState(true);
      const [marriageYr, setMarriageYr] = useState(4);
      const [kids, setKids] = useState(true);
      const [kidYr, setKidYr] = useState(6);
      const [house, setHouse] = useState(true);
      const [houseYr, setHouseYr] = useState(5);
      const [burnout, setBurnout] = useState(true);

      const [corpStartSal, setCorpStartSal] = useState(100000);
      const [corpRaise, setCorpRaise] = useState(0.04);
      const [corpPromoFreq, setCorpPromoFreq] = useState(4);
      const [corpPromoLift, setCorpPromoLift] = useState(0.15);
      const [corpSaveRt, setCorpSaveRt] = useState(0.20);

      const [mobile, setMobile] = useState(() => window.innerWidth < 700);
      useEffect(() => {
        const fn = () => setMobile(window.innerWidth < 700);
        window.addEventListener('resize', fn);
        return () => window.removeEventListener('resize', fn);
      }, []);

      const trajectory = useMemo(() => {
        const yrs = []; let nw = startNW, cRev = 50000, certRev = 0, africaRev = 0, regIntelRev = 0, quantumRev = 0, inv = 0, solo = 0, bEq = 0, exited = false, loanBal = studentLoan;
        for (let y = 1; y <= 15; y++) {
          const atE = y <= everYrs;
          const sal = atE ? 100000 * Math.pow(1.03, y) : 0;
          let loanPayment = 0;
          if (loanBal > 0) {
            loanBal *= (1 + loanRate);
            if (loanPayoff === "strategic") {
              loanPayment = Math.min(loanBal, y <= loanPayoffYr ? 7200 : loanBal);
              if (y === loanPayoffYr) loanPayment = loanBal;
            } else {
              loanPayment = Math.min(loanBal, 24000);
            }
            loanBal = Math.max(0, loanBal - loanPayment);
          }
          const inRecession = recession && (y === recessionYr || y === recessionYr + 1);
          const recMult = inRecession ? (y === recessionYr ? 0.65 : 0.80) : 1.0;
          const burnoutMult = burnout && y >= 3 && y <= 4 ? 0.90 : 1.0;
          if (y <= 2) cRev = 50000 + y * 75000;
          else if (y <= 5) cRev *= (1 + cGrowth * 0.7 * burnoutMult);
          else if (y <= 8) cRev = Math.min(cRev * (1 + cGrowth * 0.3), 3000000);
          else cRev = Math.min(cRev * 1.03, 3500000);
          cRev *= recMult;
          if (y >= certLaunchYr && !exited) {
            if (y === certLaunchYr) certRev = 150000;
            else certRev *= (1 + certGrowth * Math.max(0.3, 1 - (y - certLaunchYr) * 0.08));
            certRev *= recMult;
          }
          if (y >= 3) {
            if (y === 3) africaRev = 100000;
            else africaRev *= (1 + africaGrowth * Math.max(0.4, 1 - (y - 3) * 0.06));
            africaRev *= (inRecession ? 0.85 : 1.0);
          }
          if (y >= quantumLaunchYr && !exited) {
            if (y === quantumLaunchYr) quantumRev = 120000;
            else quantumRev *= (1 + 0.65 * Math.max(0.3, 1 - (y - quantumLaunchYr) * 0.08));
            quantumRev *= recMult;
          }
          if (y >= 5) {
            if (y === 5) regIntelRev = 80000;
            else regIntelRev *= (1 + 0.40 * Math.max(0.3, 1 - (y - 5) * 0.07));
            regIntelRev *= recMult;
          }
          const totalBizRev = cRev + certRev + africaRev + regIntelRev + quantumRev;
          if (y === exitYr && !exited) {
            let exitableRev = certRev + cRev * 0.5 + regIntelRev + quantumRev;
            let exitProceeds = exitableRev * exitMx;
            const capGains = exitProceeds;
            const qsbsExclusion = qsbs ? Math.min(10000000, capGains) : 0;
            const taxableGains = capGains - qsbsExclusion;
            const afterTax = qsbsExclusion + taxableGains * 0.76;
            inv += afterTax;
            exited = true; bEq = 0;
            cRev *= 0.3; certRev = 0; regIntelRev = 0; quantumRev = 0;
          }
          const inc = sal + totalBizRev;
          let lifeDeduct = loanPayment;
          if (marriage && y === marriageYr) lifeDeduct += 50000;
          if (kids && y === kidYr) lifeDeduct += 10000;
          if (kids && y > kidYr) lifeDeduct += 18000;
          if (house && y === houseYr) lifeDeduct += 150000;
          const solo401kContrib = solo401k && !atE && inc > 100000 ? Math.min(69000, inc * 0.20) : 0;
          const saveable = Math.max(0, inc * saveRt - lifeDeduct);
          inv = inv * (1 + invRet) + saveable;
          solo = solo * (1 + invRet) + solo401kContrib;
          if (!exited) {
            bEq = certRev * (certRev > 2000000 ? exitMx : 3) + cRev * 2 + africaRev * 2.5 + regIntelRev * 3 + quantumRev * (quantumRev > 1000000 ? exitMx * 0.8 : 3);
          } else { bEq = africaRev * 2.5; }
          nw = inv + solo + bEq - loanBal;
          const phase = y <= 3 ? "Foundation" : y <= 6 ? "Lift-off" : y <= 10 ? "Scale" : "Exit/Empire";
          const canGift = nw >= gift / giftPct;
          yrs.push({ year: y, cal: 2025+y, age: 27+y, atE, sal, cRev, certRev, africaRev, quantumRev, regIntelRev, totalBizRev, inc, inv, solo, bEq, nw, phase, exited: y >= exitYr, canGift, inRecession, lifeDeduct, solo401kContrib, loanBal, loanPayment });
        }
        return yrs;
      }, [everYrs, cGrowth, certLaunchYr, certGrowth, africaGrowth, quantumLaunchYr, invRet, saveRt, exitYr, exitMx, startNW, gift, giftPct, recession, recessionYr, qsbs, solo401k, marriage, marriageYr, kids, kidYr, house, houseYr, burnout, studentLoan, loanRate, loanPayoff, loanPayoffYr]);

      const corpTrajectory = useMemo(() => {
        const yrs = []; let sal = corpStartSal, inv = 0, k401 = 0, loanBal = studentLoan;
        for (let y = 1; y <= 15; y++) {
          sal *= (1 + corpRaise);
          if (y % corpPromoFreq === 0) sal *= (1 + corpPromoLift);
          let loanPayment = 0;
          if (loanBal > 0) {
            loanBal *= (1 + loanRate);
            if (loanPayoff === "strategic") { loanPayment = Math.min(loanBal, y <= loanPayoffYr ? 7200 : loanBal); if (y === loanPayoffYr) loanPayment = loanBal; }
            else { loanPayment = Math.min(loanBal, 24000); }
            loanBal = Math.max(0, loanBal - loanPayment);
          }
          let lifeDeduct = loanPayment;
          if (marriage && y === marriageYr) lifeDeduct += 50000;
          if (kids && y === kidYr) lifeDeduct += 10000;
          if (kids && y > kidYr) lifeDeduct += 18000;
          if (house && y === houseYr) lifeDeduct += 150000;
          const employeeContrib = Math.min(23000, sal * 0.10);
          const employerMatch = Math.min(sal * 0.04, 6000);
          const saveable = Math.max(0, sal * corpSaveRt - lifeDeduct);
          inv = inv * (1 + invRet) + saveable;
          k401 = k401 * (1 + invRet) + employeeContrib + employerMatch;
          const nw = inv + k401 - loanBal;
          yrs.push({ year: y, cal: 2025+y, age: 27+y, sal, inv, k401, nw, loanBal });
        }
        return yrs;
      }, [corpStartSal, corpRaise, corpPromoFreq, corpPromoLift, corpSaveRt, invRet, studentLoan, loanRate, loanPayoff, loanPayoffYr, marriage, marriageYr, kids, kidYr, house, houseYr]);

      const hgseYr = trajectory.find(y => y.canGift);
      const maxNW = Math.max(...trajectory.map(y => y.nw), 1);
      const fin = trajectory[14];
      const reqNW = gift / giftPct;
      const pc = { Foundation: "#60a5fa", "Lift-off": "#a78bfa", Scale: "#22c55e", "Exit/Empire": "#f59e0b" };
      const totalSolo = fin?.solo || 0;
      const qsbsSavings = qsbs ? Math.min(10000000, (trajectory[Math.min(exitYr-1,14)]?.certRev||0)*exitMx) * 0.24 : 0;
      const debtFreeYr = trajectory.find(y => y.loanBal <= 0);
      const totalLoanPaid = trajectory.reduce((s, y) => s + (y.loanPayment || 0), 0);
      const corpFin = corpTrajectory[14];
      const crossoverYr = trajectory.find((y,i) => i > 0 && y.nw > (corpTrajectory[i]?.nw||0) && trajectory[i-1].nw <= (corpTrajectory[i-1]?.nw||0));
      const corpMaxNW = Math.max(...corpTrajectory.map(y => y.nw), 1);

      return (
        <div style={{ fontFamily: "'DM Sans', sans-serif", background: "linear-gradient(180deg, #020617 0%, #0f172a 50%, #020617 100%)", minHeight: "100vh", color: "#e2e8f0", padding: mobile ? "16px 12px" : "20px 16px" }}>
          <div style={{ maxWidth: 1020, margin: "0 auto" }}>
            <h1 style={{ fontFamily: "'Space Mono'", fontSize: mobile ? 14 : 18, fontWeight: 700, color: "#a78bfa", margin: "0 0 3px" }}>15-YEAR WEALTH TRAJECTORY</h1>

                      evolves:"This is your legacy vehicle. You keep this even if you sell everything else. It's AI-proof because no AI replicates your Beninese government relationships."},
                    {phase:"INTEL",year:"Year 5-15",name:"Regulatory Intelligence Service",icon:"📊",color:"#4ade80",
                      what:"Subscription-based intel: which AI/quantum regulations are passing where, what compliance frameworks apply, what audit standards are required. Usage-based pricing. Enterprises pay because the regulatory landscape changes monthly.",
                      revenue:"$80K-$2M/yr",
                      evolves:"Feeds directly into your consulting and certification businesses. Clients subscribe for intel, then hire you for implementation."},
                  ].map((m,i)=>(
                    <div key={i} style={{marginBottom:2,position:"relative"}}>
                      {i<5&&<div style={{position:"absolute",left:17,top:70,bottom:-2,width:2,background:`${m.color}33`,zIndex:0}}/>}
                      <div style={{display:"flex",gap:12,padding:14,background:"#0f172a",borderRadius:10,border:`1px solid ${m.color}22`,position:"relative",zIndex:1}}>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:36}}>
                          <div style={{fontSize:22}}>{m.icon}</div>
                          <div style={{fontSize:8,color:m.color,fontWeight:700,marginTop:2}}>{m.phase}</div>
                        </div>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                            <div style={{fontSize:14,fontWeight:700,color:m.color}}>{m.name}</div>
                            <div style={{display:"flex",gap:6}}>
                              <span style={{fontSize:9,background:`${m.color}15`,border:`1px solid ${m.color}33`,borderRadius:4,padding:"1px 6px",color:m.color,fontWeight:600}}>{m.year}</span>
                              <span style={{fontSize:9,background:"#22c55e15",border:"1px solid #22c55e33",borderRadius:4,padding:"1px 6px",color:"#22c55e",fontWeight:600}}>{m.revenue}</span>
                            </div>
                          </div>
                          <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.5,marginBottom:6}}>{m.what}</div>
                          <div style={{fontSize:10,color:m.color,fontWeight:600,fontStyle:"italic"}}>Evolves: {m.evolves}</div>
                        </div>
                      </div>
                    </div>
                  ))}
                </Card>

                <Card title="Why NOT SaaS" accent="#f43f5e">
                  <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.7}}>
                    <p style={{margin:"0 0 8px"}}><span style={{color:"#f43f5e",fontWeight:700}}>The SaaSpocalypse (2026):</span> $2T wiped from software stocks. Per-seat SaaS is dying. Atlassian -35%, Salesforce -28%. AI agents are replacing the human seats that SaaS companies charge for. Median SaaS multiple dropped from 7x to below 5x.</p>
                    <p style={{margin:"0 0 8px"}}><span style={{color:"#22d3ee",fontWeight:700}}>Your models are AI-proof because:</span> Governance requires human judgment. Certification requires institutional trust. Africa marketplace requires relationships. Regulatory intel requires implementation knowledge. None of these can be replaced by an AI agent.</p>
                    <p style={{margin:0}}><span style={{color:"#f59e0b",fontWeight:700}}>The playbook:</span> Start with training (cash flow). Evolve to governance (higher margins). Build the certification (recurring revenue + highest multiple asset). Expand to quantum (market expansion). Keep Africa (legacy). Layer on regulatory intel (recurring subscription). Sell the cert+governance+quantum business at 5-8x. Keep Africa. That's $100M.</p>
                  </div>
                </Card>
              </div>
            )}

            {tab==="waves"&&(
              <div style={{animation:"fadeIn 0.3s"}}>
                <Card title="Macro Wave Timeline" accent="#f59e0b">
                  <div style={{marginBottom:6,display:"flex",gap:2}}>{Array.from({length:15},(_,i)=>(<div key={i} style={{flex:1,textAlign:"center"}}><div style={{fontSize:7,color:"#64748b"}}>{2026+i}</div><div style={{fontSize:6,color:"#22d3ee"}}>{28+i}</div></div>))}</div>
                  {WAVES.map(w=>(<div key={w.id} style={{marginBottom:5}}>
                    <div style={{display:"flex",gap:2,alignItems:"center"}}>
                      {Array.from({length:15},(_,i)=>{const on=i+1>=w.years[0]&&i+1<=w.years[1];return(<div key={i} style={{flex:1,height:11,borderRadius:3,background:on?`${w.color}66`:"#0f172a",border:on?`1px solid ${w.color}44`:"1px solid #1e293b"}}/>);})}
                      <span style={{fontSize:9,color:w.color,fontWeight:600,minWidth:100,marginLeft:4}}>{w.name}</span>
                    </div>
                  </div>))}
                </Card>
                {WAVES.map(w=>(<Card key={w.id} title={`${w.name} (peak: ${w.peak})`} accent={w.color}>
                  <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
                    <div><div style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>The Shift</div><div style={{fontSize:11,color:"#94a3b8",lineHeight:1.5}}>{w.desc}</div></div>
                    <div><div style={{fontSize:10,color:w.color,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Why You</div><div style={{fontSize:11,color:"#94a3b8",lineHeight:1.5}}>{w.you}</div></div>
                  </div>
                </Card>))}
              </div>
            )}

            {tab==="hgse"&&(
              <div style={{animation:"fadeIn 0.3s"}}>
                <div style={{background:"linear-gradient(135deg,#1a0a2e,#0f172a 50%,#0a1628)",border:"1px solid #a78bfa33",borderRadius:16,padding:24,marginBottom:16}}>
                  <div style={{fontSize:12,color:"#a78bfa",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:3}}>The HGSE Legacy</div>
                  <div style={{fontFamily:"'Space Mono'",fontSize:30,fontWeight:700,color:"#e2e8f0"}}>{fmtM(gift)} Scholarship</div>
                  <div style={{fontSize:12,color:"#94a3b8",marginTop:4,marginBottom:16}}>Wipe out student loan debt for every student of color at HGSE</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <Metric label="Students" value="283" sub="36% of HGSE" color="#a78bfa" large/>
                    <Metric label="Avg Debt" value="~$53K" color="#22d3ee" large/>
                    <Metric label="Total" value={fmtM(283*53000)} color="#4ade80" large/>
                    <Metric label="Need NW" value={fmtM(reqNW)} sub={pct(giftPct)} color="#f59e0b" large/>
                    <Metric label="Viable" value={hgseYr?`${hgseYr.cal}`:"--"} sub={hgseYr?`Age ${hgseYr.age}`:""} color={hgseYr?"#4ade80":"#f87171"} large/>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:14}}>
                  <Card title="Tax + QSBS Impact" accent="#22d3ee">
                    {(()=>{const tSave=gift*0.42;const eCost=gift-tSave; return(<>
                      {[["Gift",fmtM(gift),"#e2e8f0"],["Tax Savings (42%)",fmtM(tSave),"#4ade80"],["Effective Cost",fmtM(eCost),"#22d3ee"],["QSBS Exit Savings",qsbs?fmtM(qsbsSavings):"N/A","#4ade80"]].map(([l,v,c],i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #1e293b"}}><span style={{fontSize:11,color:"#94a3b8"}}>{l}</span><span style={{fontFamily:"'Space Mono'",fontSize:12,color:c,fontWeight:700}}>{v}</span></div>
                      ))}
                      <div style={{marginTop:8,fontSize:11,color:"#64748b",lineHeight:1.5}}>QSBS + charitable deductions together could save {fmtM(qsbsSavings + gift*0.42)} in taxes. That's money funding the scholarship, not the IRS.</div>
                    </>);})()}
                  </Card>
                  <Card title="Structure Options" accent="#a78bfa">
                    <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.6}}>
                      <p style={{margin:"0 0 8px"}}><span style={{color:"#a78bfa",fontWeight:700}}>A: Full wipeout.</span> 283 students debt-free.</p>
                      <p style={{margin:"0 0 8px"}}><span style={{color:"#4ade80",fontWeight:700}}>B: Endowment.</span> {fmtM(gift)} at 5% = {fmtM(gift*0.05)}/yr (~{Math.round(gift*0.05/53000)} scholarships/yr forever).</p>
                      <p style={{margin:"0 0 8px"}}><span style={{color:"#facc15",fontWeight:700}}>C: Hybrid.</span> {fmtM(gift*0.5)} wipeout + {fmtM(gift*0.5)} endowment.</p>
                      <p style={{margin:0}}><span style={{color:"#f43f5e",fontWeight:700}}>The Zounon Scholars Program at HGSE.</span></p>
                    </div>
                  </Card>
                </div>
                <Card title="The Path (with risks modeled)" accent="#facc15">
                  <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.7}}>
                    <p style={{margin:"0 0 8px"}}><span style={{color:"#facc15",fontWeight:700}}>With recession, marriage, kids, house, burnout, and your own $100K student loans all factored in</span>, you reach {fmtM(reqNW)} around {hgseYr?`${hgseYr.cal} (age ${hgseYr.age})`:"your early 40s"}. This isn't a fantasy projection — it accounts for every real-world drag on your finances.</p>
                    <p style={{margin:"0 0 8px"}}><span style={{color:"#f43f5e",fontWeight:700}}>The story that makes it unforgettable:</span> "I carried $100K in HGSE debt. I know what it feels like to graduate from Harvard and wonder how you'll pay rent. That's why 283 students will never have to carry that weight."</p>
                    <p style={{margin:0}}><span style={{color:"#a78bfa",fontWeight:700}}>The Zounon Scholars.</span> Built on AI-proof, quantum-proof revenue. From -$50K net worth to a $15M gift. That's the arc.</p>
                  </div>
                </Card>
              </div>
            )}
            {tab==="corp"&&(
              <div style={{animation:"fadeIn 0.3s"}}>
                <div style={{display:"grid",gridTemplateColumns:mobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:8,marginBottom:14}}>
                  <Metric label="Corporate NW (Yr 15)" value={fmtM(corpFin?.nw||0)} color="#3b82f6" large/>
                  <Metric label="Entrep NW (Yr 15)" value={fmtM(fin?.nw||0)} color="#a78bfa" large/>
                  <Metric label="Gap at Yr 15" value={fmtM(Math.abs((fin?.nw||0)-(corpFin?.nw||0)))} color={(fin?.nw||0)>(corpFin?.nw||0)?"#4ade80":"#f43f5e"} large/>
                  <Metric label="Crossover" value={crossoverYr?`${crossoverYr.cal}`:"Not yet"} sub={crossoverYr?`Age ${crossoverYr.age}`:""} color={crossoverYr?"#f59e0b":"#64748b"} large/>
                </div>

                <Card title="Wealth Trajectory: Entrepreneurship vs Corporate America" accent="#3b82f6">
                  <div style={{display:"flex",gap:12,marginBottom:10,flexWrap:"wrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:12,height:12,borderRadius:2,background:"#a78bfa"}}/><span style={{fontSize:10,color:"#94a3b8"}}>Entrepreneurship</span></div>
                    <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:12,height:12,borderRadius:2,background:"#3b82f6"}}/><span style={{fontSize:10,color:"#94a3b8"}}>Corporate America</span></div>
                  </div>
                  <div style={{display:"flex",alignItems:"flex-end",gap:mobile?1:3,height:mobile?140:200,padding:"0 2px"}}>
                    {trajectory.map((y,i)=>{
                      const cY=corpTrajectory[i];
                      const maxBoth=Math.max(maxNW,corpMaxNW,1);
                      const chartH=mobile?118:178;
                      const hEnt=Math.max((y.nw/maxBoth)*chartH,2);
                      const hCorp=Math.max((cY.nw/maxBoth)*chartH,2);
                      const entAhead=y.nw>=cY.nw;
                      return(
                        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                          {crossoverYr&&y.year===crossoverYr.year&&<div style={{fontSize:7,color:"#4ade80",fontWeight:700,whiteSpace:"nowrap"}}>CROSS</div>}
                          <div style={{display:"flex",gap:1,alignItems:"flex-end",width:"100%",justifyContent:"center"}}>
                            <div title={`Entrep: ${fmtM(y.nw)}`} style={{width:"46%",height:hEnt,background:`linear-gradient(180deg,#a78bfa,#a78bfa66)`,borderRadius:"2px 2px 0 0",transition:"height 0.5s"}}/>
                            <div title={`Corp: ${fmtM(cY.nw)}`} style={{width:"46%",height:hCorp,background:`linear-gradient(180deg,#3b82f6,#3b82f666)`,borderRadius:"2px 2px 0 0",transition:"height 0.5s"}}/>
                          </div>
                          <div style={{fontSize:mobile?6:7,color:"#64748b",textAlign:"center",fontWeight:700}}>{mobile?String(y.cal).slice(2):y.cal}</div>
                        </div>
                      );
                    })}
                  </div>
                  {crossoverYr&&<div style={{marginTop:8,fontSize:10,color:"#4ade80",fontWeight:600}}>Entrepreneurship path takes the lead in {crossoverYr.cal} (Age {crossoverYr.age})</div>}
                </Card>

                <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:14}}>
                  <Card title="Corporate Path Assumptions" accent="#3b82f6">
                    <Slider label="Starting Salary" value={corpStartSal} onChange={setCorpStartSal} min={60000} max={250000} step={5000}/>
                    <Slider label="Annual Raise" value={corpRaise} onChange={setCorpRaise} min={0.01} max={0.08} step={0.005} format="percent" sub="Industry avg: 3-4% at utilities"/>
                    <Slider label="Promotion Every N Years" value={corpPromoFreq} onChange={setCorpPromoFreq} min={2} max={8} step={1} format="raw" sub="Typical: every 3-5 years"/>
                    <Slider label="Promotion Lift" value={corpPromoLift} onChange={setCorpPromoLift} min={0.05} max={0.35} step={0.05} format="percent" sub="Typical bump: 10-20%"/>
                    <Slider label="Savings Rate" value={corpSaveRt} onChange={setCorpSaveRt} min={0.05} max={0.40} step={0.05} format="percent" sub="On top of 401k"/>
                    <div style={{marginTop:8,padding:"8px 10px",background:"#0f172a",borderRadius:8,fontSize:10,color:"#64748b",lineHeight:1.5}}>
                      Includes: ${Math.round(Math.min(23000, corpStartSal*0.10)/1000)}K/yr 401k + {Math.round(Math.min(corpStartSal*0.04,6000)/1000)}K employer match. Uses same life events, investment return, and loan settings from the Adjust tab.
                    </div>
                  </Card>

                  <Card title="Year-by-Year Comparison" accent="#22d3ee">
                    <div style={{overflowX:"auto"}}>
                      <div style={{display:"grid",gridTemplateColumns:"42px 26px 52px 52px 58px",gap:1,minWidth:250}}>
                        {["Year","Age","Corp","Entrep","Gap"].map(h=>(
                          <div key={h} style={{background:"#1e293b",padding:"3px 2px",fontSize:7,fontWeight:700,color:"#94a3b8",textAlign:"center",textTransform:"uppercase"}}>{h}</div>
                        ))}
                        {trajectory.map((y,i)=>{
                          const cY=corpTrajectory[i];
                          const adv=y.nw-cY.nw;
                          const isCross=crossoverYr&&y.year===crossoverYr.year;
                          const bg=isCross?"#4ade800a":"transparent";
                          return(<React.Fragment key={i}>
                            <div style={{padding:"3px 1px",textAlign:"center",background:bg,fontFamily:"'Space Mono'",fontSize:9,color:"#e2e8f0",fontWeight:700}}>{y.cal}</div>
                            <div style={{padding:"3px 1px",fontFamily:"'Space Mono'",fontSize:9,textAlign:"center",background:bg,color:"#22d3ee",fontWeight:700}}>{y.age}</div>
                            <div style={{padding:"3px 1px",fontFamily:"'Space Mono'",fontSize:8,textAlign:"center",background:bg,color:"#3b82f6"}}>{fmtM(cY.nw)}</div>
                            <div style={{padding:"3px 1px",fontFamily:"'Space Mono'",fontSize:8,textAlign:"center",background:bg,color:"#a78bfa"}}>{fmtM(y.nw)}</div>
                            <div style={{padding:"3px 1px",fontFamily:"'Space Mono'",fontSize:8,textAlign:"center",background:bg,color:adv>=0?"#4ade80":"#f43f5e",fontWeight:700}}>{adv>=0?"+":""}{fmtM(adv)}</div>
                          </React.Fragment>);
                        })}
                      </div>
                    </div>
                  </Card>
                </div>

                <Card title="The Honest Case for Both Paths" accent="#64748b">
                  <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:16}}>
                    <div>
                      <div style={{fontSize:10,color:"#3b82f6",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>🏢 Why Corporate Makes Sense</div>
                      {[
                        ["Predictable income","No payroll anxiety. Salary hits your account every 2 weeks regardless of economic conditions."],
                        ["Benefits package","Health, dental, disability insurance — cheap while employed. Expensive or unavailable as a solo founder."],
                        ["Employer 401k match","Free money. 4% match = ~$4K/yr you'd leave on the table by leaving."],
                        ["Recession-proof income","If you stay, a recession slows your raise. If you leave, a recession can kill your business."],
                        ["Time to build quietly","You can build the foundation (certifications, clients, Africa network) while Eversource pays the bills."],
                      ].map(([t,d],i)=>(
                        <div key={i} style={{marginBottom:8,paddingLeft:10,borderLeft:"2px solid #3b82f644"}}>
                          <div style={{fontSize:11,color:"#cbd5e1",fontWeight:600,marginBottom:2}}>{t}</div>
                          <div style={{fontSize:10,color:"#64748b",lineHeight:1.5}}>{d}</div>
                        </div>
                      ))}
                    </div>
                    <div>
                      <div style={{fontSize:10,color:"#f43f5e",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>⚠️ The Real Cost of Staying</div>
                      {[
                        ["The window closes","AI governance positioning is a 2025-2030 opportunity. Every year in corporate is a year incumbents build moats you'll have to fight through."],
                        ["The salary ceiling","At Eversource trajectory, Year 15 salary hits ~"+fmtM(corpFin?.sal||0)+". Your entrepreneurship target is "+fmtM(fin?.nw||0)+" net worth — a different universe."],
                        ["Compounding relationships","The Harvard network, the Beninese government connections, the Francophone Africa pipeline — these compound when you're actively working them, atrophy when you're in meetings."],
                        ["Identity drift","Every year in corporate consolidates your identity as an employee. The longer you stay, the harder the psychological leap to founder."],
                        ["The gap: "+fmtM(Math.abs((fin?.nw||0)-(corpFin?.nw||0))),"That's the 15-year difference between the two paths with all risks modeled. Adjust sliders to explore scenarios."],
                      ].map(([t,d],i)=>(
                        <div key={i} style={{marginBottom:8,paddingLeft:10,borderLeft:"2px solid #f43f5e44"}}>
                          <div style={{fontSize:11,color:"#cbd5e1",fontWeight:600,marginBottom:2}}>{t}</div>
                          <div style={{fontSize:10,color:"#64748b",lineHeight:1.5}}>{d}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </Card>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

</body>
</html>
